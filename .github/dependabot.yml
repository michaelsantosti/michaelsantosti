version: 2
updates:
  # Actions do workflow (checkout, setup-python, etc.)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
    commit-message:
      prefix: "ci"

  # Pacotes Python do today.py
  - package-ecosystem: "pip"
    directory: "/cache"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
    commit-message:
      prefix: "deps"
